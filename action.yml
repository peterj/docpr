name: "docpr sync"
description: >
  Analyzes merged PR code changes and automatically updates documentation, if needed.

branding:
  icon: "book-open"
  color: "purple"

inputs:
  llm_provider:
    description: "LLM provider to use: 'anthropic' or 'openai'"
    required: false
    default: "anthropic"

  anthropic_api_key:
    description: "Anthropic API key (required when llm_provider is 'anthropic')"
    required: false

  openai_api_key:
    description: "OpenAI API key (required when llm_provider is 'openai')"
    required: false

  docs_repo:
    description: "Documentation repository in the format 'owner/repo'"
    required: true

  docs_repo_token:
    description: >
      GitHub token with read/write access to the documentation repository.
      Needs 'contents: write' and 'pull-requests: write' permissions.
    required: true

  docs_base_branch:
    description: "Base branch in the docs repo to branch from and PR into"
    required: false
    default: "main"

  docs_path:
    description: "Subdirectory within the docs repo to search for documentation (e.g. 'docs/' or 'content/')"
    required: false
    default: ""

  source_repo_token:
    description: "GitHub token for reading the source (current) repository. Defaults to github.token."
    required: false
    default: ${{ github.token }}

  model:
    description: "LLM model to use. Defaults to 'claude-opus-4-5' for Anthropic and 'gpt-4o' for OpenAI."
    required: false
    default: ""

  max_doc_files:
    description: "Maximum number of doc files to fetch and analyze (to control token usage)"
    required: false
    default: "20"

  pr_label:
    description: "Label to apply to the created documentation PR"
    required: false
    default: "docpr"

runs:
  using: "node20"
  main: "dist/index.js"
